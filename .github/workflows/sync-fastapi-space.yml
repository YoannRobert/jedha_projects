name: Sync FastAPI Space → HuggingFace

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'bloc5/Getaround_Analysis/spaces/api/**'  # triggered only when this folder changes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push vers HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd bloc5/Getaround_Analysis/spaces/api
          git init -b main
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Sync from GitHub – ${{ github.sha }}"
          git push --force \
            https://YoannRobert:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/YoannRobert/FastAPI_Getaround_Price_Prediction \
            main